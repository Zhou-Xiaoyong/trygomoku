<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#1a1a2e"/>
  <!-- Grid lines -->
  <line x1="8" y1="5" x2="8" y2="27" stroke="#5c4033" stroke-width="0.5" opacity="0.5"/>
  <line x1="16" y1="5" x2="16" y2="27" stroke="#5c4033" stroke-width="0.5" opacity="0.5"/>
  <line x1="24" y1="5" x2="24" y2="27" stroke="#5c4033" stroke-width="0.5" opacity="0.5"/>
  <line x1="4" y1="8" x2="28" y2="8" stroke="#5c4033" stroke-width="0.5" opacity="0.5"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#5c4033" stroke-width="0.5" opacity="0.5"/>
  <line x1="4" y1="24" x2="28" y2="24" stroke="#5c4033" stroke-width="0.5" opacity="0.5"/>
  <!-- Black stone -->
  <circle cx="12" cy="11" r="4.5" fill="#1a1a1a"/>
  <circle cx="12" cy="11" r="4.5" fill="url(#blackShine)" opacity="0.4"/>
  <!-- White stone -->
  <circle cx="20" cy="16" r="4.5" fill="#f0f0f0"/>
  <circle cx="20" cy="16" r="4.5" fill="url(#whiteShine)" opacity="0.5"/>
  <!-- Black stone -->
  <circle cx="12" cy="21" r="4.5" fill="#1a1a1a"/>
  <circle cx="12" cy="21" r="4.5" fill="url(#blackShine)" opacity="0.4"/>
  <!-- Gloss effect -->
  <defs>
    <radialGradient id="blackShine" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="whiteShine" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#ccc"/>
    </radialGradient>
  </defs>
</svg>
